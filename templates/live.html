<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lives</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 12px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .type-badge { font-size: 0.85em; padding: 6px 10px; border-radius: 20px; font-weight: 500; }
        .bg-camera { background-color: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
        .bg-iot { background-color: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; }
        .bg-server { background-color: #f3e5f5; color: #4a148c; border: 1px solid #e1bee7; }
        
        .btn-live { background: #ff4757; color: white; border: none; font-size: 0.85rem; }
        .btn-live:hover { background: #ff6b81; color: white; }
        .btn-deep { background: #2f3542; color: white; border: none; font-size: 0.85rem; }
        .btn-deep:hover { background: #57606f; color: white; }
        
        .stream-box { 
            background: #000; 
            width: 100%; 
            min-height: 400px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative;
        }
        .stream-box img { width: 100%; height: auto; object-fit: contain; max-height: 500px; }

        .ptz-panel { background-color: #212529; border-radius: 8px; padding: 15px; border: 1px solid #444; }
        .ptz-btn { height: 45px; font-size: 1.1rem; }
    </style>
</head>
<body> 
<div class="modal fade" id="liveModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title"><i class="fas fa-video text-danger me-2"></i>Live Monitor</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" onclick="stopStream()"></button>
            </div>
            <div class="modal-body bg-secondary">
                
                <div class="row g-2 mb-2 p-2 bg-dark rounded mx-0">
                    <div class="col-md-3">
                        <input type="text" id="ipAddr" class="form-control form-control-sm bg-secondary text-white border-0" value="192.168.1." placeholder="IP Address">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="portCam" class="form-control form-control-sm bg-secondary text-white border-0" placeholder="554" value="554">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="camUser" class="form-control form-control-sm bg-secondary text-white border-0" value="admin" placeholder="Username (admin)">
                    </div>
                    <div class="col-md-3">
                        <input type="password" id="camPwd" class="form-control form-control-sm bg-secondary text-white border-0" placeholder="Password">
                    </div>
                    <div class="col-md-4">
                        <select id="camPath" class="form-select form-select-sm bg-secondary text-white border-0">
                            <option value="onvif1">ONVIF (onvif1)</option>
                            <option value="stream1">Standard (stream1)</option>
                            <option value="live">Generic (live)</option>
                            <option value="cam/realmonitor?channel=1&subtype=0">Dahua (Main)</option>
                            <option value="cam/realmonitor?channel=1&subtype=1">Dahua (Sub)</option>
                            <option value="Streaming/Channels/101">Hikvision (Main)</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button onclick="refreshStream()" class="btn btn-warning btn-sm w-100 fw-bold">
                            <i class="fas fa-sync-alt"></i> Reload & Save
                        </button>
                    </div>
                </div>

                <div class="stream-box shadow">
                    <div id="streamLoader" class="spinner-border text-light position-absolute" style="display:none;"></div>
                    <img id="videoStream" src="" alt="NO SIGNAL" onerror="this.style.display='none';">
                    <div id="streamError" class="text-white position-absolute" style="display:none;">Connection Failed / Auth Required</div>
                </div>

                <div style="display:none" class="ptz-panel mt-3 shadow-sm">
                    <div class="row align-items-center">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <h6 class="text-warning fw-bold border-bottom border-secondary pb-1 mb-3"><i class="fas fa-gamepad"></i> PTZ CAMERA CONTROL</h6>
                            <div class="d-flex justify-content-between text-light small mb-2">
                                <span id="label-servo1"><i class="fas fa-arrows-alt-h text-info"></i> ซ้าย-ขวา (Servo 1):</span>
                                <span id="angle-txt-1" class="badge bg-secondary">Offline</span>
                            </div>
                            <div class="d-flex justify-content-between text-light small">
                                <span id="label-servo2"><i class="fas fa-arrows-alt-v text-success"></i> ขึ้น-ลง (Servo 2):</span>
                                <span id="angle-txt-2" class="badge bg-secondary">Offline</span>
                            </div>
                            <div id="ptz-alert-status" class="alert alert-danger text-center mt-3 p-1 mb-0" style="font-size: 0.85rem; font-weight: bold;">
                                มอเตอร์ยังไม่ถูกบันทึกค่า (กรุณาไปที่เมนู Servo Setup)
                            </div>
                        </div>

                        <div class="col-md-6 text-center">
                            <div class="d-inline-block" style="width: 200px;">
                                <div class="row g-1 mb-1 justify-content-center">
                                    <div class="col-4"><button onclick="movePTZ('2', 'up')" id="ctrl-up" class="btn btn-outline-warning w-100 ptz-btn shadow-sm" disabled><i class="fas fa-chevron-up"></i></button></div>
                                </div>
                                <div class="row g-1 mb-1 justify-content-center">
                                    <div class="col-4"><button onclick="movePTZ('1', 'left')" id="ctrl-left" class="btn btn-outline-warning w-100 ptz-btn shadow-sm" disabled><i class="fas fa-chevron-left"></i></button></div>
                                    <div class="col-4"><button onclick="movePTZ('1', 'home')" id="ctrl-home" class="btn btn-warning w-100 ptz-btn shadow-sm fw-bold text-dark" style="font-size: 0.8rem;" disabled>HOME</button></div>
                                    <div class="col-4"><button onclick="movePTZ('1', 'right')" id="ctrl-right" class="btn btn-outline-warning w-100 ptz-btn shadow-sm" disabled><i class="fas fa-chevron-right"></i></button></div>
                                </div>
                                <div class="row g-1 justify-content-center">
                                    <div class="col-4"><button onclick="movePTZ('2', 'down')" id="ctrl-down" class="btn btn-outline-warning w-100 ptz-btn shadow-sm" disabled><i class="fas fa-chevron-down"></i></button></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deepScanModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="fas fa-search-plus me-2"></i>Deep Scan (1-65535)</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center p-4">
                <h4 id="deepIpDisplay" class="mb-3 fw-bold text-dark"></h4>
                
                <div id="deepLoading">
                    <div class="spinner-grow text-primary" role="status"></div>
                    <div class="spinner-grow text-primary" role="status"></div>
                    <div class="spinner-grow text-primary" role="status"></div>
                    <p class="mt-3 text-muted">Scanning all 65,535 ports...<br><small>(This takes about 15-30 seconds)</small></p>
                </div>

                <div id="deepResult" style="display:none;">
                    <h6 class="text-start mb-2 text-muted">Open Ports Found:</h6>
                    <div id="portList" class="d-flex flex-wrap gap-2 justify-content-center p-3 bg-light rounded border">
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);

    const liveModal = new bootstrap.Modal(document.getElementById('liveModal'));
    const deepScanModal = new bootstrap.Modal(document.getElementById('deepScanModal'));
    let currentIp = '';

    // ================= AUTO SAVE CREDENTIALS LOGIC =================
    function loadSavedCredentials(ip) {
        // ตรวจสอบว่าเคยเซฟรหัสผ่านของ IP นี้ไว้ในเครื่อง (Local Storage) หรือยัง
        const savedData = localStorage.getItem('cam_auth_' + ip);
        if (savedData) {
            const auth = JSON.parse(savedData);
            document.getElementById('portCam').value = auth.port || '554';
            document.getElementById('camUser').value = auth.user || 'admin';
            document.getElementById('camPwd').value = auth.pwd || '';
            document.getElementById('camPath').value = auth.path || 'onvif1';
            return true; // เจอประวัติ
        }
        return false; // ไม่เจอประวัติ
    }

    function saveCredentials(ip) {
        // ดึงค่าปัจจุบันมาเซฟไว้ผูกกับ IP นี้
        const authData = {
            port: document.getElementById('portCam').value,
            user: document.getElementById('camUser').value,
            pwd: document.getElementById('camPwd').value,
            path: document.getElementById('camPath').value
        };
        localStorage.setItem('cam_auth_' + ip, JSON.stringify(authData));
    }

    // ================= LIVE STREAM LOGIC =================
    function openLive(ip) {
        currentIp = ip;
        document.getElementById('streamError').style.display = 'none';
        
        // ลองดึงประวัติ ถ้าไม่มีให้เคลียร์เป็นค่าเริ่มต้น
        const hasHistory = loadSavedCredentials(ip);
        if (!hasHistory) {
            document.getElementById('camUser').value = 'admin';
            document.getElementById('camPwd').value = '';
        }

        liveModal.show();
        setTimeout(refreshStream, 500); 
    }

    function refreshStream() {
        const portCam = document.getElementById('portCam').value;
        const currentIp = document.getElementById('ipAddr').value;
        const user = document.getElementById('camUser').value;
        const pwd = document.getElementById('camPwd').value;
        const path = document.getElementById('camPath').value;
        
        const img = document.getElementById('videoStream');
        const loader = document.getElementById('streamLoader');
        const errorMsg = document.getElementById('streamError');

        // สั่งบันทึกรหัสผ่านทุกครั้งที่กด Reload
        if (currentIp) saveCredentials(currentIp);

        img.style.display = 'none';
        loader.style.display = 'block';
        errorMsg.style.display = 'none';

        const streamUrl = `/video_feed?ip=${currentIp}&port=${portCam}&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}&path=${encodeURIComponent(path)}&t=${Date.now()}`;
        
        const timeout = setTimeout(() => {
            if (img.style.display === 'none') {
                loader.style.display = 'none';
                errorMsg.innerText = "Request Timeout: Camera not responding";
                errorMsg.style.display = 'block';
                img.src = ""; 
            }
        }, 10000);

        img.src = streamUrl;

        img.onload = function() {
            clearTimeout(timeout);
            loader.style.display = 'none';
            img.style.display = 'block';
        };

        img.onerror = function() {
            clearTimeout(timeout);
            loader.style.display = 'none';
            errorMsg.innerText = "Connection Failed / Auth Error";
            errorMsg.style.display = 'block';
        };
    }

    function stopStream() {
        document.getElementById('videoStream').src = "";
        window.location.href="/";
    }

    // ================= URL PARAMETERS HANDLER =================
    if(urlParams.get('ip')) {
        const targetIp = urlParams.get('ip');
        document.getElementById('ipAddr').value = targetIp;
        
        // ลองโหลดค่า Save ไว้มาใส่ช่อง ถ้าไม่มีค่อยดึงจาก URL (ถ้ามีส่งมา)
        const hasHistory = loadSavedCredentials(targetIp);
        if (!hasHistory) {
            if(urlParams.get('port')) document.getElementById('portCam').value = urlParams.get('port');
            if(urlParams.get('user')) document.getElementById('camUser').value = urlParams.get('user');
            if(urlParams.get('pass')) document.getElementById('camPwd').value = urlParams.get('pass');
        }
        
        liveModal.show();
    }

    // ================= PTZ SERVO LOGIC =================
    async function updateServosStatus() {
        try {
            const response = await fetch('/api/get_servos_status');
            const data = await response.json();
            
            if (data.servo1_connected) {
                document.getElementById('angle-txt-1').innerText = data.servo1_angle + '°';
                document.getElementById('angle-txt-1').className = 'badge bg-info text-dark';
                document.getElementById('ctrl-left').disabled = false;
                document.getElementById('ctrl-right').disabled = false;
                document.getElementById('ctrl-home').disabled = false;
            }

            if (data.servo2_connected) {
                document.getElementById('angle-txt-2').innerText = data.servo2_angle + '°';
                document.getElementById('angle-txt-2').className = 'badge bg-success text-dark';
                document.getElementById('ctrl-up').disabled = false;
                document.getElementById('ctrl-down').disabled = false;
                document.getElementById('ctrl-home').disabled = false;
            }

            if (data.servo1_connected || data.servo2_connected) {
                const alertBox = document.getElementById('ptz-alert-status');
                alertBox.className = 'alert alert-success text-center mt-3 p-1 mb-0';
                alertBox.innerHTML = '<i class="fa-solid fa-circle-check"></i> ระบบมอเตอร์ PTZ พร้อมทำงาน';
            }
        } catch (error) {
            console.log("Error status connection failed");
        }
    }

    async function movePTZ(servoId, direction) {
        try {
            const response = await fetch('/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ servo_id: servoId, direction: direction })
            });
            const data = await response.json();
            if (data.status === "ok") {
                document.getElementById(`angle-txt-${servoId}`).innerText = data.angle + '°';
                if (direction === 'home') {
                    fetch('/move', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ servo_id: '2', direction: 'home' }) }).then(() => updateServosStatus());
                }
            }
        } catch (e) {
            console.log("Failed to send PTZ command");
        }
    }

    // Trigger update status and load config when modal is shown
    document.getElementById('liveModal').addEventListener('shown.bs.modal', function () {
        updateServosStatus();
        
        // พยายามโหลดภาพอัตโนมัติถ้าเปิด Modal ขึ้นมา (ถ้ามี IP อยู่ในช่องแล้ว)
        if(document.getElementById('ipAddr').value !== "192.168.1." && document.getElementById('ipAddr').value !== "") {
            refreshStream();
        }
    });

</script>
</body>
</html>
