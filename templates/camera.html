<!DOCTYPE html>
<html lang="th" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera PTZ Controller</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1a1d20; border-bottom: 2px solid #dc3545; }
        .card { background-color: #1e2125; border: 1px solid #333; }
        
        .video-container {
            position: relative;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #444;
            max-width: 800px;
            margin: 0 auto;
        }
        .video-stream { width: 100%; height: auto; display: block; }
        .ptz-wrapper { max-width: 240px; margin: 0 auto; }
        .ptz-btn { height: 60px; font-size: 1.3rem; }
        .angle-badge { font-family: monospace; font-size: 0.95rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 p-3 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-danger fw-bold" href="#"><i class="fa-solid fa-camera"></i> CAMERA VIEW & MOTOR PTZ CONTROL</a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn btn-outline-info btn-sm fw-bold"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-4">
            
            <div class="col-lg-8">
                <div class="card shadow-sm p-3 text-center">
                    <h5 class="text-start mb-3 fw-bold text-light">
                        <i class="fa-solid fa-camera text-danger"></i> Camera Target IP: <span id="camera-target-ip" class="text-info">--</span>
                    </h5>
                    
                    <div class="video-container shadow">
                        <img id="stream-img" src="" class="video-stream" alt="กรุณากดเลือกกล้องจากหน้าหลัก หรือตรวจสอบการเชื่อมต่อ">
                    </div>
                    
                    <div class="mt-3 text-muted small">
                        * ระบบดึงข้อมูลภาพสตรีมสดจากกล้องไอพีปลายทางด้วยโปรโตคอล RTSP
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm p-4">
                    <h5 class="fw-bold mb-4 border-bottom border-secondary pb-2">
                        <i class="fa-solid fa-gamepad text-warning"></i> REMOTE PTZ CONTROLLER
                    </h5>

                    <div class="mb-4 bg-dark rounded p-3 border border-secondary">
                        <div class="d-flex justify-content-between mb-2">
                            <span id="label-servo1"><i class="fa-solid fa-arrows-left-right text-info"></i> ซ้าย-ขวา (Servo 1):</span>
                            <span id="angle-txt-1" class="badge bg-info text-dark angle-badge">Disconnected</span>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span id="label-servo2"><i class="fa-solid fa-arrows-up-down text-success"></i> ขึ้น-ลง (Servo 2):</span>
                            <span id="angle-txt-2" class="badge bg-success text-dark angle-badge">Disconnected</span>
                        </div>
                    </div>

                    <div class="ptz-wrapper text-center">
                        <div class="row mb-2">
                            <div class="col-4"></div>
                            <div class="col-4">
                                <button onclick="movePTZ('2', 'up')" id="ctrl-up" class="btn btn-outline-warning w-100 ptz-btn" disabled><i class="fa-solid fa-chevron-up"></i></button>
                            </div>
                            <div class="col-4"></div>
                        </div>
                        
                        <div class="row mb-2">
                            <div class="col-4">
                                <button onclick="movePTZ('1', 'left')" id="ctrl-left" class="btn btn-outline-warning w-100 ptz-btn" disabled><i class="fa-solid fa-chevron-left"></i></button>
                            </div>
                            <div class="col-4">
                                <div class="bg-secondary rounded-circle h-100 d-flex align-items-center justify-content-center text-dark fw-bold">PTZ</div>
                            </div>
                            <div class="col-4">
                                <button onclick="movePTZ('1', 'right')" id="ctrl-right" class="btn btn-outline-warning w-100 ptz-btn" disabled><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-4"></div>
                            <div class="col-4">
                                <button onclick="movePTZ('2', 'down')" id="ctrl-down" class="btn btn-outline-warning w-100 ptz-btn" disabled><i class="fa-solid fa-chevron-down"></i></button>
                            </div>
                            <div class="col-4"></div>
                        </div>
                    </div>

                    <div id="ptz-alert-status" class="alert alert-danger text-center mt-4 fw-bold p-2 small">
                        กรุณาเปิดตั้งค่าขา GPIO ที่หน้า Servo Controller ก่อน
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const cameraIp = urlParams.get('ip');

        if (cameraIp) {
            document.getElementById('camera-target-ip').innerText = cameraIp;
            document.getElementById('stream-img').src = `/video_feed?ip=${cameraIp}&path=onvif1`;
        }

        async function updateServosStatus() {
            try {
                const response = await fetch('/api/get_servos_status');
                const data = await response.json();
                
                if (data.servo1_connected) {
                    document.getElementById('angle-txt-1').innerText = data.servo1_angle + '°';
                    document.getElementById('label-servo1').innerHTML = `<i class="fa-solid fa-arrows-left-right text-info"></i> ซ้าย-ขวา [${data.servo1_type.toUpperCase()}]:`;
                    document.getElementById('ctrl-left').disabled = false;
                    document.getElementById('ctrl-right').disabled = false;
                }

                if (data.servo2_connected) {
                    document.getElementById('angle-txt-2').innerText = data.servo2_angle + '°';
                    document.getElementById('label-servo2').innerHTML = `<i class="fa-solid fa-arrows-up-down text-success"></i> ขึ้น-ลง [${data.servo2_type.toUpperCase()}]:`;
                    document.getElementById('ctrl-up').disabled = false;
                    document.getElementById('ctrl-down').disabled = false;
                }

                if (data.servo1_connected || data.servo2_connected) {
                    const alertBox = document.getElementById('ptz-alert-status');
                    alertBox.className = 'alert alert-success text-center mt-4 fw-bold p-2 small';
                    alertBox.innerHTML = '<i class="fa-solid fa-circle-check"></i> ฮาร์ดแวร์พร้อมรับคำสั่ง';
                }
            } catch (error) {
                console.log("Error status connection failed");
            }
        }

        async function movePTZ(servoId, direction) {
            try {
                const response = await fetch('/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ servo_id: servoId, direction: direction })
                });
                const data = await response.json();
                if (data.status === "ok") {
                    document.getElementById(`angle-txt-${servoId}`).innerText = data.angle + '°';
                }
            } catch (e) {
                console.log("Failed to send PTZ command");
            }
        }

        updateServosStatus();
    </script>
</body>
</html>
