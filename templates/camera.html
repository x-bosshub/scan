<!DOCTYPE html>
<html lang="th" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspberry Pi Hardware Camera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1a1d20; border-bottom: 2px solid #0d6efd; }
        .card { background-color: #1e2125; border: 1px solid #333; }
        .video-box { background: #000; border-radius: 8px; border: 2px solid #0d6efd; overflow: hidden; width: 100%; max-width: 800px; margin: 0 auto; }
        .video-box img { width: 100%; height: auto; display: block; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 p-3 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-primary fw-bold" href="#"><i class="fa-solid fa-microchip"></i> RASPBERRY PI HARDWARE CAMERA</a>
            <div class="d-flex align-items-center">
                <a href="/" class="btn btn-outline-info btn-sm fw-bold"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container text-center">
        <div class="card p-4 shadow-sm">
            <h4 class="text-start mb-3 fw-bold text-info"><i class="fa-solid fa-bolt text-warning"></i> สัญญาณภาพสดจากบอร์ด (On-Board Stream)</h4>
            
            <div class="video-box shadow-lg mb-3">
                <img src="/video_pi" alt="ไม่สามารถเปิดกล้องฮาร์ดแวร์ได้ (กรุณาเช็คการเชื่อมต่อสาย CSI / USB)">
            </div>
            
            <p class="text-muted small mb-0">
                สตรีมมิ่งเซสชันตรงจากฮาร์ดแวร์ Raspberry Pi ผ่านช่องอุปกรณ์หลัก `/dev/video0` 
            </p>
        </div>
    </div>

</body>
</html>
